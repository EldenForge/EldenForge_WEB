name: Deploy

on:
  push:
    branches: [main, recette]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "target=prod" >> "$GITHUB_OUTPUT"
            echo "dir=/opt/eldenforge" >> "$GITHUB_OUTPUT"
          else
            echo "target=recette" >> "$GITHUB_OUTPUT"
            echo "dir=/opt/eldenforge-recette" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash ${{ steps.env.outputs.dir }}/EldenForge_WEB/deploy/deploy.sh ${{ steps.env.outputs.target }}
